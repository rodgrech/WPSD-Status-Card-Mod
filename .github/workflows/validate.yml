name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check JavaScript syntax
        run: node --check dist/wpsd-radio-card.js

      - name: Validate JSON
        run: node -e "JSON.parse(require('fs').readFileSync('hacs.json', 'utf8'))"
